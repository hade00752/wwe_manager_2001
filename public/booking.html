<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Booking — WWF GM</title>

  <!-- PS2 theme background + base typography -->
  <link rel="stylesheet" href="/css/theme-2002.css" />

  <!-- Your existing layout/styles MUST remain (drives positioning) -->
  <link rel="stylesheet" href="./styles.css?v=9"/>

  <!-- VS picker styling -->
  <link rel="stylesheet" href="/css/vs_picker.css">

  <!-- Page-specific overrides: ONLY cosmetics, no layout changes -->
  <style>
    /* Keep existing layout intact; only polish the chrome */

    body{
      /* theme-2002 sets background; this ensures your old styles don’t wipe it */
      background: transparent !important;
    }

    header.booking-header{
      padding: 14px 16px 0;
      margin: 0;
    }

    .booking-banner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(10,40,70,.22);
      border: 1px solid rgba(140,240,255,.22);
      box-shadow:
        0 0 0 2px rgba(0,0,0,.16) inset,
        0 0 26px rgba(120,240,255,.12);
    }

    .booking-title{
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: rgba(235,250,255,.92);
      margin:0;
      font-size: 14px;
    }

    .booking-sub{
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(160,210,240,.82);
      opacity:.95;
    }

    /* Cards: keep size/flow, only re-skin */
    .card{
      background: rgba(10, 20, 45, .35) !important;
      border: 1px solid rgba(140,240,255,.14) !important;
      box-shadow:
        0 0 0 2px rgba(0,0,0,.18) inset,
        0 10px 30px rgba(0,0,0,.35) !important;
      backdrop-filter: blur(1.5px);
    }

    /* Inputs/selects/buttons: do NOT change spacing, just look */
    select, button, input[type="text"]{
      background: rgba(10,40,70,.22) !important;
      color: rgba(240,252,255,.92) !important;
      border: 1px solid rgba(140,240,255,.22) !important;
      box-shadow: 0 0 0 2px rgba(0,0,0,.14) inset;
      border-radius: 14px;
    }

    button{
      cursor:pointer;
      font-weight: 900;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    button:hover{ filter: brightness(1.05); }
    button:disabled{ opacity:.55; cursor:not-allowed; }

    /* Pills: keep your existing `.pill` usage but look more theme-consistent */
    .pill{
      border: 1px solid rgba(140,240,255,.22) !important;
      background: rgba(10,40,70,.18) !important;
      color: rgba(220,240,255,.88) !important;
      box-shadow: 0 0 18px rgba(120,240,255,.08);
      border-radius: 999px !important;
    }

    .pill.warn{
      border-color: rgba(255,170,0,.35) !important;
      background: rgba(255,170,0,.10) !important;
      box-shadow: 0 0 18px rgba(255,170,0,.08);
      color: rgba(255,230,200,.92) !important;
    }

    /* Brand accents (used by booking.js in champions list) */
    .brand-raw{ color: rgba(255,110,110,.95) !important; border-color: rgba(255,90,90,.35) !important; }
    .brand-sd { color: rgba(120,190,255,.95) !important; border-color: rgba(120,190,255,.30) !important; }
  </style>

  <script type="module" src="./js/booking.js"></script>
  <script nomodule>
    alert("Your browser/server loaded modules as classic scripts. Check that only booking.js is included with type='module'.");
  </script>
</head>

<body>
  <!-- theme background overlay -->
  <div class="ui-bg"></div>

  <!-- Keep header placement (top), but make it PS2-ish -->
  <header class="booking-header">
    <div class="booking-banner">
      <h1 class="booking-title">WWF GM — Booking</h1>
      <div class="booking-sub">Book the week, then simulate results</div>
    </div>
  </header>

  <!-- Your existing nav injection stays where it was -->
  <script type="module" src="./js/nav.js"></script>

  <!-- Keep root exactly where it was -->
  <main class="card" id="booking-root"></main>
</body>
</html>
