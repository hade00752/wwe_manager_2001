<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WWF GM — Main Menu</title>

  <link rel="stylesheet" href="/css/theme-2002.css" />

  <!-- tiny page-specific header styling (keeps your theme file clean) -->
  <style>
    .mm-banner{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
    }
    .mm-plate{
      padding:10px 18px;
      border-radius:999px;
      text-transform:uppercase;
      font-weight:900;
      letter-spacing:.14em;
      color:rgba(235,250,255,.92);
      background:rgba(10,40,70,.22);
      border:1px solid rgba(140,240,255,.22);
      box-shadow:
        0 0 0 2px rgba(0,0,0,.16) inset,
        0 0 26px rgba(120,240,255,.12);
    }
    .mm-sub{
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(160,210,240,.82);
      opacity:.95;
    }
  </style>
</head>

<body>
  <div class="ui-bg"></div>

  <main class="ui-stage" id="mainmenu-root">
    <section class="ui-shell" style="width:min(760px, 94vw);">

      <header class="mm-banner">
        <div class="mm-plate" id="mmTitle">WWF GM</div>
        <div class="mm-sub" id="mmSubtitle">Main Menu</div>
      </header>

      <div class="menu-list" id="menuList"></div>

      <div id="menuFooter"
           style="width:100%; display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:10px;">
      </div>

      <div class="ui-hint">↑ ↓ select · Enter confirm · Esc back · Click to confirm</div>
    </section>
  </main>

  <script>
    window.addEventListener('error', e => {
      const el = document.getElementById('menuList');
      if (el) el.innerHTML = `<div style="color:rgba(255,120,100,.9);font-size:13px;padding:12px;background:rgba(255,0,0,.08);border-radius:8px;border:1px solid rgba(255,80,80,.3)">[JS Error] ${e.message}<br><small>${e.filename}:${e.lineno}</small></div>`;
    });
    window.addEventListener('unhandledrejection', e => {
      const el = document.getElementById('menuList');
      if (el) el.innerHTML = `<div style="color:rgba(255,120,100,.9);font-size:13px;padding:12px;background:rgba(255,0,0,.08);border-radius:8px;border:1px solid rgba(255,80,80,.3)">[Module Error] ${e.reason?.message || String(e.reason)}</div>`;
    });
  </script>
  <script type="module" src="/js/mainmenu.js"></script>
</body>
</html>
